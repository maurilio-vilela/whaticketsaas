    <!-- Meta Tags para Redes Sociais -->
    <!-- Facebook/Open Graph -->
    <meta property="og:title" content="Dialogix - CRM Multiagente para WhatsApp">

    <!-- Twitter -->
    <meta name="twitter:card" content="Dialogix">
    <meta name="twitter:title" content="Dialogix - CRM Multiagente para WhatsApp">
    <meta name="twitter:description" content="Transforme a comunicação da sua empresa com o Dialogix. CRM Multiagente para WhatsApp que potencializa o atendimento ao cliente.">

    <meta name="twitter:site" content="@dialogix"> <!-- Substitua pelo seu handle do Twitter -->
    <style>
        #splash-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            z-index: 9999;
        }

        #splash-content {
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #00bfa5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-container {
            width: 75%;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
            margin-left: auto;
            margin-right: auto;
        }

        .progress-bar {
            height: 100%;
            background-color: #00bfa5;
            width: 0;
            transition: width 0.3s;
        }
    </style>
</head>

<body>
    <div id="splash-screen">
        <div id="splash-content">
            <div class="spinner"></div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </div>
    <div id="root"></div>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <script>
        let progress = 0;
        const progressBar = document.getElementById('progress-bar');
        const interval = setInterval(() => {
            if (progress < 60) {
                progress += 8;
            } else if (progress < 90) {
                progress += 5;
            } else {
                progress += (100 - progress) / 10;
            }
            progressBar.style.width = progress + '%';

            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('splash-screen').remove();
                }, 300);
            }
        }, 800);

        window.finishProgress = () => {
            progress = 100;
        };

        window.onload = () => {
            // Optional: Remove splash screen after window is fully loaded
        };
    </script>
</body>
</html>
